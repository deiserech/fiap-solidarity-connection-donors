apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: solidarity-connection
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: solidarity-connection
  minReplicas: 1
  maxReplicas: 5
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 90
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 90
